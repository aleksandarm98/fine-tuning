services:
  # Dry run — provera pipeline-a bez GPU (radi na Mac/Linux)
  # Zahteva: dry_run: true u config.yaml
  dry-run:
    build:
      context: .
      args:
        BASE_IMAGE: python:3.11-slim
        REQUIREMENTS: requirements-cpu.txt
    profiles: ["dry-run"]
    env_file: .env
    volumes:
      - hf_cache:/cache/huggingface
      - ./output:/app/output
      - ./config.yaml:/app/config.yaml
    command: ["python", "scripts/run_pipeline.py"]

  # Pravi trening na GPU serveru
  # Zahteva: dry_run: false u config.yaml, NVIDIA GPU >= 16GB
  train:
    build:
      context: .
    profiles: ["train"]
    env_file: .env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - hf_cache:/cache/huggingface
      - ./output:/app/output
      - ./config.yaml:/app/config.yaml
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
    command: ["python", "scripts/run_pipeline.py"]

volumes:
  hf_cache:
