# =============================================================================
# Iteracija 9: Mathstral-7B-v0.1 fine-tuning
# =============================================================================
# Ideja: Mathstral ima jače matematičko znanje od Mistral Instruct-a.
# Fine-tuning samo za format/jezik (srpski, LaTeX, struktura) sa minimalnim
# uticajem na matematičke sposobnosti.
#
# PAŽNJA: Mathstral NIJE instruct model — nema chat template.
# inference.py mora da koristi raw prompt umesto apply_chat_template().
#
# Konzervativni parametri: rank 8, samo q/v, nizak LR.
# Custom config dao najbolje rezultate za Mistral — ali Mathstral možda
# treba još manje agresivan pristup jer polazi sa boljom bazom.

dry_run: false

model:
  name: "mistralai/Mathstral-7B-v0.1"

dataset:
  raw_dir: "data/raw"
  splits_dir: "data/splits"
  train_files:
    - "Drzavno_A__2022_dataset.json"
    - "Drzavno_B__2022_dataset.json"
    - "Okruzno__2022_dataset.json"
    - "Opstinsko__2022_dataset.json"
    - "Drzavno_A__2023_dataset.json"
    - "Drzavno_B__2023_dataset.json"
    - "Opstinsko__2023_dataset.json"
  val_files:
    - "Okruzno_2023__dataset.json"
  test_files:
    - "DrzavnoA2024_dataset.json"
    - "DrzavnoB2024_dataset.json"
    - "OkruznoAB2024_dataset.json"
    - "OpstinskoAB2024_dataset.json"

qlora:
  rank: 8
  alpha: 16
  dropout: 0.05
  target_modules:
    - "q_proj"
    - "v_proj"

training:
  num_epochs: 3
  batch_size: 2
  gradient_accumulation_steps: 16   # effective batch = 32
  learning_rate: 5.0e-5
  lr_scheduler: "cosine"
  warmup_ratio: 0.10
  weight_decay: 0.01
  max_seq_length: 2048
  early_stopping_patience: 2
  eval_steps: 3
  seed: 42

generation:
  max_new_tokens: 1024
  temperature: 0.1
  top_p: 0.95
  repetition_penalty: 1.1

evaluation:
  judge_model: "us.anthropic.claude-3-7-sonnet-20250219-v1:0"
  aws_region: "us-east-1"
  aws_profile: "finetune"
  weights:
    factual: 0.40
    logic: 0.30
    quality: 0.30

output:
  checkpoints_dir: "output/checkpoints"
  model_dir: "output/model"
  results_dir: "output/results"
