# =============================================================================
# Iteracija 8A: rank 16, samo attention moduli (q/k/v/o), lr 2e-4
# =============================================================================
# Ideja: pun kapacitet za učenje (rank 16) ali bez MLP modula
# koji čuvaju matematičko znanje. NIJE probano u prethodnih 7 iteracija.
# Iteracije 3-4 su imale rank 8 i underfit-ovale - ovde imamo rank 16.

dry_run: false

model:
  name: "mistralai/Mistral-7B-Instruct-v0.3"

dataset:
  raw_dir: "data/raw"
  splits_dir: "data/splits"
  train_files:
    - "Drzavno_A__2022_dataset.json"
    - "Drzavno_B__2022_dataset.json"
    - "Okruzno__2022_dataset.json"
    - "Opstinsko__2022_dataset.json"
    - "Drzavno_A__2023_dataset.json"
    - "Drzavno_B__2023_dataset.json"
    - "Opstinsko__2023_dataset.json"
  val_files:
    - "Okruzno_2023__dataset.json"
  test_files:
    - "DrzavnoA2024_dataset.json"
    - "DrzavnoB2024_dataset.json"
    - "OkruznoAB2024_dataset.json"
    - "OpstinskoAB2024_dataset.json"

qlora:
  rank: 16
  alpha: 32
  dropout: 0.10
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"

training:
  num_epochs: 3
  batch_size: 2
  gradient_accumulation_steps: 16
  learning_rate: 2.0e-4
  lr_scheduler: "cosine"
  warmup_ratio: 0.10
  weight_decay: 0.05
  max_seq_length: 2048
  early_stopping_patience: 2
  eval_steps: 5
  seed: 42

generation:
  max_new_tokens: 1024
  temperature: 0.1
  top_p: 0.95
  repetition_penalty: 1.1

evaluation:
  judge_model: "us.anthropic.claude-3-7-sonnet-20250219-v1:0"
  aws_region: "us-east-1"
  aws_profile: "finetune"
  weights:
    factual: 0.30
    logic: 0.40
    quality: 0.30

output:
  checkpoints_dir: "output/checkpoints"
  model_dir: "output/model"
  results_dir: "output/results"
